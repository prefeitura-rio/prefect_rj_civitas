name: rj_civitas__cetrio_radar_ocr
prefect-version: 3.4.3

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_civitas/deployments
      tag: "rj_civitas__cetrio_radar_ocr-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/rj_civitas__cetrio_radar_ocr/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_civitas

deployments:
  - name: rj-civitas--cetrio_radar_ocr--staging
    tags: [staging]
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_civitas__cetrio_radar_ocr/flow.py:rj_civitas__cetrio_radar_ocr
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_civitas__cetrio_radar_ocr -- prefect flow-run execute
        secretName: prefect-jobs-secrets-staging
        image_pull_policy: Always
  - name: rj-civitas--cetrio_radar_ocr--prod
    tags: [prod]
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_civitas__cetrio_radar_ocr/flow.py:rj_civitas__cetrio_radar_ocr
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_civitas__cetrio_radar_ocr -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

    schedules:
    - interval: 86400
      anchor_date: "2026-04-14T00:00:00-03:00"
      timezone: America/Sao_Paulo
      slug: cetrio_radar_daily
      parameters:
        dataset_id: cerco_digital
        table_id: radar
        dump_mode: overwrite
        filename: radar_data.csv
        environment: prod
        required_secrets:
          - CETRIO_RADAR__URL
          - CETRIO_RADAR__TOKEN
