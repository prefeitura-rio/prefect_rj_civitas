name: rj_civitas__fogo_cruzado
prefect-version: 3.4.3

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_civitas/deployments
      tag: "rj_civitas__fogo_cruzado-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/rj_civitas__fogo_cruzado/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_civitas

deployments:
  - name: rj-civitas--fogo_cruzado--staging
    tags: [staging]
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_civitas__fogo_cruzado/flow.py:rj_civitas__fogo_cruzado
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_civitas__fogo_cruzado -- prefect flow-run execute
        secretName: prefect-jobs-secrets-staging
        image_pull_policy: Always
  - name: rj-civitas--fogo_cruzado--prod
    tags: [prod]
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_civitas__fogo_cruzado/flow.py:rj_civitas__fogo_cruzado
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_civitas__fogo_cruzado -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

    schedules:
      - interval: 86400
        anchor_date: "2024-09-07T00:00:00-03:00"
        timezone: America/Sao_Paulo
        slug: fogo_cruzado_daily
        parameters:
          project_id: rj-civitas
          dataset_id: fogo_cruzado
          table_id: ocorrencias
          prefix: PARTIAL_REFRESH_
          take: 100
          write_disposition: WRITE_APPEND
          materialize_after_dump: true
          materialize_reports_fc_after_dump: true
          mode: prod
          github_repo: https://github.com/prefeitura-rio/pipelines_rj_civitas
          gcs_buckets:
            prod: "rj-civitas_dbt"
            dev: "rj-civitas-dev_dbt"
          required_secrets:
            - FOGOCRUZADO_USERNAME
            - FOGOCRUZADO_PASSWORD
            - REDIS_HOST
